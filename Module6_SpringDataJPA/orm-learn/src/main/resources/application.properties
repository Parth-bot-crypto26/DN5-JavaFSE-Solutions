# Hands on 1: database and log configuration
# (H2 in-memory used here in place of MySQL so the module runs with zero external setup)

# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug
# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.orm.jdbc.bind=trace
# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# Database configuration
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate ddl auto (create, create-drop, update, validate)
# "update" lets Hibernate create the tables from the @Entity classes on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Run data.sql AFTER Hibernate has created the schema (ddl-auto=update above)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 web console for quick inspection: http://localhost:8080/h2-console (not used in CLI runs)
spring.h2.console.enabled=true
