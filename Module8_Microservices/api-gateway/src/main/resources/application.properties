spring.application.name=api-gateway
server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# "Make the necessary configurations in the application.properties file"
# Discovery locator turns every registered Eureka service into an automatic
# route: GET /GREET-SERVICE/greet -> greet-service's /greet endpoint.
spring.cloud.gateway.discovery.locator.enabled=true

# "specify the service name in lower case" - without this the auto-generated
# route only matches the upper-case service ID (GREET-SERVICE), not
# /greet-service/greet as used in the doc's final curl/browser test.
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

logging.level.com.cognizant.apigateway=debug
logging.level.org.springframework.cloud.gateway=debug
